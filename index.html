<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>家計トラッカー</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- PIN認証画面 -->
  <div id="lockScreen" class="lock-screen">
    <div class="lock-content">
      <div class="lock-icon">&#128176;</div>
      <h1 class="lock-title">家計トラッカー</h1>
      <p class="lock-sub" id="lockMessage">PINを入力してください</p>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-pad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key" data-key=""></button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key delete" data-key="delete">&#9003;</button>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- ヘッダー -->
    <header class="header">
      <div class="month-nav">
        <button id="prevMonth" class="nav-btn" aria-label="前月">&larr;</button>
        <h1 id="monthTitle" class="month-title">2026年4月</h1>
        <button id="nextMonth" class="nav-btn" aria-label="翌月">&rarr;</button>
        <button id="settingsBtn" class="nav-btn settings-btn" aria-label="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 全体サマリー -->
    <section class="summary-card">
      <div class="summary-amounts">
        <span class="summary-actual" id="totalActual">--</span>
        <span class="summary-separator">/</span>
        <span class="summary-budget" id="totalBudget">--</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="totalProgress">
          <div class="progress-fill" id="totalProgressFill"></div>
        </div>
      </div>
      <div class="summary-meta">
        <span id="totalPercent">--%</span>
        <span id="totalRemaining">残り --</span>
      </div>
      <div id="paceInfo" class="pace-info"></div>
    </section>

    <!-- カテゴリ一覧 -->
    <section class="categories" id="categoriesList">
      <!-- app.jsで動的生成 -->
    </section>

    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>データを読み込み中...</p>
    </div>

    <!-- エラー -->
    <div class="error-message" id="errorMessage" style="display:none">
      <p id="errorText">データの取得に失敗しました</p>
      <button onclick="location.reload()" class="retry-btn">再読み込み</button>
    </div>

    <!-- フッター -->
    <footer class="footer">
      <p id="updatedAt">最終更新: --</p>
    </footer>
  </div>

  <!-- 予算編集モーダル -->
  <div class="modal" id="budgetModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2 class="modal-title" id="budgetModalTitle">カテゴリ名</h2>
      <p class="modal-sub" id="budgetCurrentActual">実績: --</p>
      <label class="modal-label">月額予算 (円)</label>
      <input type="number" id="budgetInput" class="modal-input" min="0" step="1000" inputmode="numeric">
      <div class="modal-actions">
        <button id="budgetReset" class="modal-btn reset" style="display:none">元に戻す</button>
        <div class="modal-actions-right">
          <button id="budgetCancel" class="modal-btn cancel">キャンセル</button>
          <button id="budgetSave" class="modal-btn save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="modal" id="settingsModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2 class="modal-title">目標設定</h2>
      <p class="modal-sub">予算に対する支出目標を設定します</p>
      <label class="modal-label">目標: <strong id="targetValue">85%</strong></label>
      <input type="range" id="targetInput" class="target-slider" min="50" max="100" value="85" step="5">
      <div class="target-range-labels">
        <span>50%</span>
        <span>100%</span>
      </div>
      <p class="modal-hint">プログレスバーに目標ラインが表示されます。<br>各カテゴリをタップすると予算を変更できます。</p>
      <hr class="modal-divider">
      <button id="pinResetBtn" class="modal-btn reset">PINを再設定する</button>
      <div class="modal-actions">
        <div class="modal-actions-right">
          <button id="settingsClose" class="modal-btn save">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
